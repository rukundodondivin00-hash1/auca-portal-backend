server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/auca_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:urubuto-webhook-secret-key-2024-auca-portal}

webhook:
  username: ${WEBHOOK_USERNAME:urubuto_webhook}
  password: ${WEBHOOK_PASSWORD:webhook_password_2024}

auca:
  notification:
    email: notifications@auca.ac.rw
  finance:
    base-url: ${AUCA_FINANCE_BASE_URL:https://auca-ims.onrender.com}
    api-key: ${AUCA_FINANCE_API_KEY:}
